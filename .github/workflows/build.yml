# based on Sonic Pi's build
name: Build

on:
  # Do it on every push or PR on these branches
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Build Overtone
  build:
    name: "${{matrix.title}} (${{matrix.cc}}, ${{matrix.arch}}, ${{matrix.build_type}})"
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              title: "Linux",
              os: "ubuntu-latest",
              cc: "clang",
              arch: "x64",
              build_type: "Release",
            }
          #- {
          #    title: "Linux",
          #    os: "ubuntu-latest",
          #    cc: "clang",
          #    arch: "x64",
          #    build_type: "Debug",
          #  }
          #- {
          #    title: "Linux",
          #    os: "ubuntu-latest",
          #    cc: "gcc",
          #    arch: "x64",
          #    build_type: "Release",
          #  }
          #- {
          #    title: "Linux",
          #    os: "ubuntu-latest",
          #    cc: "gcc",
          #    arch: "x64",
          #    build_type: "Debug",
          #  }
          - {
              title: "Windows",
              os: "windows-latest",
              cc: "vs2022",
              arch: "x64",
              build_type: "Release",
            }
          #- {
          #    title: "Windows",
          #    os: "windows-latest",
          #    cc: "vs2022",
          #    arch: "x64",
          #    build_type: "Debug",
          #  }
          - {
              title: "Mac",
              os: "macos-latest",
              cc: "clang",
              arch: "x64",
              build_type: "Release",
            }
          #- {
          #    title: "Mac",
          #    os: "macos-latest",
          #    cc: "clang",
          #    arch: "x64",
          #    build_type: "Debug",
          #  }
          - {
              title: "Mac",
              os: "macos-latest",
              cc: "clang",
              arch: "arm64",
              build_type: "Release",
            }
          #- {
          #    title: "Mac",
          #    os: "macos-latest",
          #    cc: "clang",
          #    arch: "arm64",
          #    build_type: "Debug",
          #  }

    steps:
      # Get the code
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          path: sonic-pi
          repository: 'sonic-pi-net/sonic-pi'
          sparse-checkout: |
            prebuilt

      - uses: actions/cache@v2
        with:
          path: ~/.m2/repository
          key: ${{ env.ACTION_CACHE_VERSION }}-${{ runner.os }}-maven-${{ hashFiles('**/deps.edn') }}
          restore-keys: |
            ${{ env.ACTION_CACHE_VERSION }}-${{ runner.os }}-maven-

      - name: Prepare java
        uses: actions/setup-java@v2
        with:
          distribution: 'temurin'
          java-version: 11
      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Link supercollider on Windows
        shell: bash
        run: |
          echo "${{github.workspace}}/sonic-pi/prebuilt/windows/${{matrix.arch}}" >> $GITHUB_PATH
        if: matrix.os == 'windows-latest'

      # Install supercollider on MacOS
      - name: Mac Elixir
        continue-on-error: true
        run: |
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          brew update
          brew install supercollider
        if: matrix.os == 'macos-latest'

      - name: Linux dependencies
        run: |
          sudo apt install -y pulseaudio dbus-x11 libssl-dev supercollider-server sc3-plugins-server alsa-base alsa-utils jackd2 libjack-jackd2-dev libjack-jackd2-0 libasound2-dev librtmidi-dev pulseaudio-module-jack
        if: matrix.os == 'ubuntu-latest'

      - name: Overtone tests - Mac
        env:
          SONIC_PI_ENV: test
        run: ./bin/kaocha
        if: matrix.os == 'macos-latest'

      - name: Overtone tests - Linux
        env:
          SONIC_PI_ENV: test
        run: |
          jackd -rd dummy &
          ./bin/kaocha
        if: matrix.os == 'ubuntu-latest'

      - name: API Tests Windows - Install Scream Audio Device
        shell: powershell
        run: |
          Start-Service audio*
          Invoke-WebRequest https://github.com/duncanthrax/scream/releases/download/3.6/Scream3.6.zip -OutFile C:\Scream3.6.zip
          Expand-7ZipArchive -Path C:\Scream3.6.zip -DestinationPath C:\Scream
          $cert = (Get-AuthenticodeSignature C:\Scream\Install\driver\Scream.sys).SignerCertificate
          $store = [System.Security.Cryptography.X509Certificates.X509Store]::new("TrustedPublisher", "LocalMachine")
          $store.Open("ReadWrite")
          $store.Add($cert)
          $store.Close()
          cd C:\Scream\Install\driver
          C:\Scream\Install\helpers\devcon install Scream.inf *Scream
        if: matrix.os == 'windows-latest'

      - name: Overtone tests - Windows
        shell: bash
        run: ./bin/kaocha
        if: matrix.os == 'windows-latest'

      - name: Archive Logs
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: Logs_${{matrix.title}}_${{matrix.cc}}_${{matrix.arch}}_${{matrix.build_type}}
          path: |
            ~/.overtone/log/*.log
